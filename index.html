<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saphe Tracker Dashboard</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f4f7f6; padding: 20px; max-width: 800px; margin: auto; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 30px; border-radius: 12px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .lager-tall { font-size: 3rem; font-weight: bold; color: #2ecc71; }
        .salg-tall { font-size: 3rem; font-weight: bold; color: #e74c3c; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
    </style>
</head>
<body>

    <div class="stats-grid">
        <div class="card">
            <h2>Lagerstatus</h2>
            <div id="live-lager" class="lager-tall">Laster...</div>
        </div>
        <div class="card">
            <h2>Totalt solgt</h2>
            <div id="live-salg" class="salg-tall">0</div>
        </div>
    </div>

    <h3>Historikk</h3>
    <table>
        <thead>
            <tr><th>Tidspunkt</th><th>Lager</th><th>Salg</th></tr>
        </thead>
        <tbody id="historikk-tabell"></tbody>
    </table>

    <script>
        const SUPABASE_URL = "https://czepeuyljlnpsrtqyqwe.supabase.co";
        const SUPABASE_KEY = "sb_publishable_mVzloJQX4y2OrJ_67po5Mg_Q2iXlW1b";

        async function oppdaterDashbord() {
            const url = `${SUPABASE_URL}/rest/v1/saphe_logg?select=tidspunkt,lager,solgt_siden_sist&order=id.desc&limit=100`;
            const response = await fetch(url, { 
                headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
            });
            const data = await response.json();

            if (data && data.length > 0) {
                // 1. Vis siste lager
                document.getElementById("live-lager").innerText = data[0].lager + " stk.";

                // 2. Regn ut totalt salg fra listen
                const totaltSolgt = data.reduce((sum, item) => sum + (item.solgt_siden_sist || 0), 0);
                document.getElementById("live-salg").innerText = totaltSolgt;

                // 3. Bygg tabell
                let html = "";
                data.forEach(r => {
                    html += `<tr>
                        <td>${new Date(r.tidspunkt).toLocaleTimeString()}</td>
                        <td>${r.lager}</td>
                        <td>${r.solgt_siden_sist > 0 ? '+' + r.solgt_siden_sist : '0'}</td>
                    </tr>`;
                });
                document.getElementById("historikk-tabell").innerHTML = html;
            }
        }
        oppdaterDashbord();
        setInterval(oppdaterDashbord, 30000); // Oppdaterer hver 30. sek
    </script>
</body>
</html>
