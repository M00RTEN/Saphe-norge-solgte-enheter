<!DOCTYPE html>
<html>
<head>
    <title>Saphe Tracker</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; text-align: center; }
        .grid { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px #ccc; }
        .tall { font-size: 2.5rem; font-weight: bold; }
    </style>
</head>
<body>
    <div class="grid">
        <div class="card"><h2>Lagerstatus</h2><div id="lager" class="tall">...</div></div>
        <div class="card"><h2>Totalt solgt</h2><div id="salg" class="tall">0</div></div>
    </div>
    <script>
        const URL = "https://czepeuyljlnpsrtqyqwe.supabase.co";
        const KEY = "sb_publishable_mVzloJQX4y2OrJ_67po5Mg_Q2iXlW1b";
        async function hent() {
            const res = await fetch(`${URL}/rest/v1/saphe_logg?select=lager,solgt_siden_sist&order=id.desc&limit=100`, {headers: {"apikey": KEY, "Authorization": `Bearer ${KEY}`}});
            const data = await res.json();
            if (data.length > 0) {
                document.getElementById("lager").innerText = data[0].lager + " stk.";
                const total = data.reduce((sum, item) => sum + (item.solgt_siden_sist || 0), 0);
                document.getElementById("salg").innerText = total;
            }
        }
        hent();
        setInterval(hent, 30000);
    </script>
</body>
</html>
